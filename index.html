<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bored Panda Quiz</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f4f4f4;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      max-width: 750px;
      width: 100%;
    }

    h1 {
      margin-bottom: 20px;
    }

    .question {
      font-size: 24px;
      line-height: 1.5;
      margin-bottom: 25px;
    }

    .answer-btn, .next-btn {
      display: block;
      width: 100%;
      box-sizing: border-box;
      margin: 10px 0;
      padding: 14px 18px;
      background: black;
      color: white;
      text-decoration: none;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
    }

    .message-correct {
      color: green;
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .message-wrong {
      color: red;
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .info {
      margin-top: 10px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="box" id="app"></div>

  <script>
    const questions = [
      {
        id: 1,
        question: "How many YouTube Diamond Buttons has Bored Panda earned?",
        answers: ["4", "10", "1"],
        correctAnswer: "1"
      },
      {
        id: 2,
        question: "How many video views do we generate per year?",
        answers: ["51 billion views", "100 billion views", "62 billion views"],
        correctAnswer: "62 billion views"
      },
      {
        id: 3,
        question: "What’s Bored Panda’s motto?",
        answers: [
          "Multiply your creativity with us!",
          "It's all about entertaining people!",
          "Let's fight boredom together!"
        ],
        correctAnswer: "Let's fight boredom together!"
      },
      {
        id: 4,
        question: "How many languages does Bored Panda use to distribute its content?",
        answers: ["21", "17", "12"],
        correctAnswer: "21"
      },
      {
        id: 5,
        question: "How many people work at Bored Panda?",
        answers: ["around 500", "around 1000", "around 350"],
        correctAnswer: "around 350"
      },
      {
        id: 6,
        question: "What was the #1 Facebook page in 2017?",
        answers: ["Bored Panda", "Ladbible", "Crafty Panda"],
        correctAnswer: "Bored Panda"
      },
      {
        id: 7,
        question: "What was the #1 Facebook page in 2020?",
        answers: ["Crafty Panda", "5-minute Crafts", "Gotcha!"],
        correctAnswer: "Crafty Panda"
      },
      {
        id: 8,
        question: "Bored Panda was founded in 2009. In what circumstances was it started?",
        answers: [
          "While working in a similar company",
          "While studying at the university",
          "While spending time jobless"
        ],
        correctAnswer: "While studying at the university"
      },
      {
        id: 9,
        question: "What year was Bored Panda founded?",
        answers: ["2021", "2009", "2017"],
        correctAnswer: "2009"
      },
      {
        id: 10,
        question: "When did Bored Panda start producing videos?",
        answers: ["2011", "2017", "2021"],
        correctAnswer: "2017"
      },
      {
        id: 11,
        question: "What is the name of our animated series available on YouTube and Go3?",
        answers: ["Fire spike", "Peppa Pig", "PAW Patrol"],
        correctAnswer: "Fire spike"
      },
      {
        id: 12,
        question: "What is the Lithuanian title of the Fire Spike animated series?",
        answers: ["Mažasis Ugnies Drakonas", "Ugniukas Drakoniukas", "Drakoniukas Spygliukas"],
        correctAnswer: "Drakoniukas Spygliukas"
      },
      {
        id: 13,
        question: "Bored Panda has many contractors working worldwide. Do you know approximately how many countries they come from?",
        answers: ["20", "42", "36"],
        correctAnswer: "36"
      },
      {
        id: 14,
        question: "How many offices does Bored Panda have in Vilnius?",
        answers: ["2", "3", "4"],
        correctAnswer: "2"
      },
      {
        id: 15,
        question: "In which cities does Bored Panda have offices?",
        answers: ["Vilnius and Kaunas", "Vilnius and Klaipėda", "Only in Vilnius"],
        correctAnswer: "Only in Vilnius"
      },
      {
        id: 16,
        question: "What brand is featured on the Mr. Brick YouTube channel?",
        answers: ["Minecraft", "LEGO", "Roblox"],
        correctAnswer: "LEGO"
      },
      {
        id: 17,
        question: "Which Bored Panda YouTube projects use real actors in their videos?",
        answers: ["Gotcha!", "Mr.Bricks", "Fire Spike"],
        correctAnswer: "Gotcha!"
      },
      {
        id: 18,
        question: "What type of content is published on boredpanda.com?",
        answers: [
          "In-depth political analysis and investigative world news reporting",
          "Technical articles focused on business strategy, finance, and economics",
          "Pop culture, entertainment news, and lifestyle stories"
        ],
        correctAnswer: "Pop culture, entertainment news, and lifestyle stories"
      }
    ];

    const app = document.getElementById("app");

    function shuffleArray(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function getRandomQuestion() {
      return questions[Math.floor(Math.random() * questions.length)];
    }

    function renderQuestion() {
      const q = getRandomQuestion();
      const shuffledAnswers = shuffleArray(q.answers);

      app.innerHTML = `
        <h1>Question</h1>
        <div class="question">${escapeHtml(q.question)}</div>
        ${shuffledAnswers.map(answer => `
          <button class="answer-btn" onclick="checkAnswer(${q.id}, '${encodeForJs(answer)}')">
            ${escapeHtml(answer)}
          </button>
        `).join("")}
      `;
    }

    function checkAnswer(questionId, chosenAnswer) {
      const q = questions.find(item => item.id === questionId);
      const isCorrect = chosenAnswer === q.correctAnswer;

      app.innerHTML = `
        <div class="${isCorrect ? "message-correct" : "message-wrong"}">
          ${isCorrect ? "CORRECT" : "Sorry, you got the answer wrong"}
        </div>
        <div class="info"><strong>Question:</strong> ${escapeHtml(q.question)}</div>
        <div class="info"><strong>Your answer:</strong> ${escapeHtml(chosenAnswer)}</div>
        <button class="next-btn" onclick="renderQuestion()">Next question</button>
      `;
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function encodeForJs(text) {
      return String(text)
        .replace(/\\/g, "\\\\")
        .replace(/'/g, "\\'")
        .replace(/"/g, '&quot;');
    }

    renderQuestion();
  </script>
</body>
</html>
